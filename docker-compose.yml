services:
  # Optional local Redis for future shared-cache wiring. The app is memory-cache first.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  backend:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      CACHE_BACKEND: memory
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
