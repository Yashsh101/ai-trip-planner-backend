name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  check:
    name: Lint, Type check, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run type-check
        env:
          NODE_ENV: test
          CACHE_BACKEND: memory

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          CACHE_BACKEND: memory

      - name: Build
        run: npm run build

      - name: RAG index
        run: npm run build:index
